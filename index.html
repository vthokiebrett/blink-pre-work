<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blink Social — Discovery Pre-Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap">
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#FBF8F4; color:#17130F; font-family:'Inter',sans-serif; padding:32px; }
  .card { max-width:440px; text-align:center; }
  .kicker { display:inline-flex; align-items:center; gap:9px; font:700 11px/1 'Inter',sans-serif;
    letter-spacing:.18em; text-transform:uppercase; color:#94897C; margin-bottom:20px; }
  .dot { width:11px; height:11px; border-radius:50%; background:#D85030; }
  h1 { font:700 34px/1.1 'Space Grotesk',sans-serif; letter-spacing:-0.015em; margin:0 0 14px; }
  p { font:400 14px/1.6 'Inter',sans-serif; color:#6B6055; margin:0; }
  .rule { width:52px; height:3px; background:#D85030; border-radius:2px; margin:24px auto 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="kicker"><span class="dot"></span>Blink Social · Discovery Pre-Work</div>
    <h1>Client questionnaires</h1>
    <p>This site hosts private discovery questionnaires for Blink Social clients. If you were sent a link, please open that link directly.</p>
    <div class="rule"></div>
  </div>
</body>
</html>
