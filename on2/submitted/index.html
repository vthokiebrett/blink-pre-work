<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ON2 — Discovery Pre-Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap">
<style>
  * { box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#FBF8F4; color:#17130F; font-family:'Inter',sans-serif; padding:32px; }
  .card { max-width:520px; text-align:center; }
  .kicker { display:inline-flex; align-items:center; gap:10px; font:700 11px/1 'Inter',sans-serif;
    letter-spacing:.18em; text-transform:uppercase; color:#94897C; margin-bottom:26px; }
  .dot { width:12px; height:12px; border-radius:50%; background:#D85030; }
  .check { width:62px; height:62px; border-radius:50%; background:#FBEFE9; border:1px solid #EDCFBF;
    display:flex; align-items:center; justify-content:center; margin:0 auto 22px; }
  .check svg { width:30px; height:30px; stroke:#D85030; }
  h1 { font:700 40px/1.05 'Space Grotesk',sans-serif; letter-spacing:-0.015em; margin:0 0 16px; }
  p { font:400 15px/1.6 'Inter',sans-serif; color:#4A423B; margin:0 auto; max-width:450px; }
  .client { display:inline-block; margin-top:24px; background:#17130F; color:#fff; border-radius:10px;
    padding:9px 16px; font:700 13px/1 'Space Grotesk',sans-serif; }
  .rule { width:56px; height:3px; background:#D85030; border-radius:2px; margin:28px auto 0; }
  .back { display:inline-block; margin-top:26px; font:600 12px/1 'Inter',sans-serif;
    color:#94897C; text-decoration:none; }
  .back:hover { color:#17130F; }
</style>
</head>
<body>
  <div class="card">
    <div class="kicker"><span class="dot"></span>Blink Social · Discovery Pre-Work</div>
    <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h1>Thank you.</h1>
    <p>Your pre-work is on its way to your Blink strategist. There is nothing else you need to do, and you can close this page. We will use your answers to make your Discovery session focused and valuable.</p>
    <div class="client">ON2</div>
    <div class="rule"></div>
    <a class="back" href="../">Need to change an answer? Return to the form</a>
  </div>
</body>
</html>
